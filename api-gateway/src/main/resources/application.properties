spring.application.name=api-gateway

server.port=8080

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/Register,/Login

spring.cloud.gateway.routes[1].id=subscription-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/Plans,/Subscribe/**,/History,/Get-plan,/Admin/AddPlan

spring.cloud.gateway.routes[2].id=ott-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/Netflix/**,/Admin/**